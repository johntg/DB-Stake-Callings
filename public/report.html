<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report</title>
    <style>
      body {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 22px;
        line-height: 1.6;
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        background: #ffffff;
        color: #111;
      }

      .controls {
        position: sticky;
        top: 0;
        background: white;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }

      button {
        font-size: 16px;
        margin-right: 10px;
      }

      #report-content {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <button onclick="window.print()">Print</button>
      <button onclick="window.close()">Close</button>
    </div>

    <div id="report-content"></div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const content = params.get("content") || "";
      document.getElementById("report-content").innerText = content;
    </script>
  </body>
</html>
